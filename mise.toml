# Toolchain and task runner for developing this Action.
# The Action itself has no runtime dependencies; everything here is dev-only.
# Bootstrap: `mise install && mise run setup`

[tools]
node = "24"
biome = "2.5.2"
lefthook = "2.1.9"
markdownlint-cli2 = "0.23.0"
yq = "4.53.3"

[tasks.check]
description = "Lint & format check (Biome)"
run = "biome check ."

[tasks.fix]
description = "Auto-fix and format with Biome"
run = "biome check --write ."

[tasks.lint-md]
description = "Lint Markdown"
run = 'markdownlint-cli2 "**/*.md"'

[tasks.test]
description = "Run the offline verification harness"
run = "node test/verify.mjs"

# The bulk of this Action is a shell script embedded in YAML, which no linter
# sees by default. Extract it and let bash parse it, so a typo cannot ship.
[tasks.lint-action]
description = "Validate action.yml and syntax-check its embedded shell script"
run = '''
set -euo pipefail
script="$(yq -e -r '.runs.steps[0].run' action.yml)"
printf '%s\n' "$script" | bash -n -
echo "action.yml: YAML parsed and embedded shell script is syntactically valid."
'''

[tasks.setup]
description = "Install git hooks via lefthook"
run = "lefthook install"
